services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-alcatele_mvp}
      POSTGRES_USER: ${POSTGRES_USER:-alcatele}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-alcatele} -d ${POSTGRES_DB:-alcatele_mvp}",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
    mem_limit: 512m
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/postgresql/mvp_schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
      - ./database/postgresql/migrations/002_tenant_limits_call_groups_voicemail.sql:/docker-entrypoint-initdb.d/002-tenant-resources.sql:ro
    networks:
      - backend

  api:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-alcatele}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-alcatele_mvp}
      DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-10}
      FRONTEND_ORIGIN: https://${APP_DOMAIN:?APP_DOMAIN is required}
      COOKIE_SECURE: "true"
      WEBPHONE_SIP_DOMAIN: ${WEBPHONE_SIP_DOMAIN:-5.78.228.35}
      WEBPHONE_WSS_URL: ${WEBPHONE_WSS_URL:-wss://5.78.228.35:7443}
      WEBPHONE_ALLOW_MOCK: ${WEBPHONE_ALLOW_MOCK:-false}
      WEBPHONE_MOCK_PASSWORD: ${WEBPHONE_MOCK_PASSWORD:-}
      FUSIONPBX_BRIDGE_URL: ${FUSIONPBX_BRIDGE_URL:-}
      FUSIONPBX_BRIDGE_API_KEY: ${FUSIONPBX_BRIDGE_API_KEY:-}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
    expose:
      - "3000"
    mem_limit: 384m
    networks:
      - backend

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "80"
    mem_limit: 128m
    networks:
      - backend
      - edge

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - web
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?APP_DOMAIN is required}
    ports:
      - "80:80"
      - "443:443"
    mem_limit: 128m
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - edge

networks:
  backend:
    internal: true
  edge:

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
